<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <!-- Background texture gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0a1a2e"/>
    </radialGradient>
    <!-- Gold gradient for borders -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a020"/>
      <stop offset="30%" stop-color="#f0d060"/>
      <stop offset="50%" stop-color="#ffe880"/>
      <stop offset="70%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#d4a020"/>
    </linearGradient>
    <!-- Gold gradient for title bar -->
    <linearGradient id="titleGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a07010"/>
      <stop offset="20%" stop-color="#d4a020"/>
      <stop offset="50%" stop-color="#ffe880"/>
      <stop offset="80%" stop-color="#d4a020"/>
      <stop offset="100%" stop-color="#a07010"/>
    </linearGradient>
    <!-- Beam arrow gradient -->
    <linearGradient id="beamGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#d4a020"/>
      <stop offset="100%" stop-color="#ffe880"/>
    </linearGradient>
    <!-- Grid pattern for background texture -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none"/>
      <line x1="20" y1="0" x2="20" y2="20" stroke="#ffffff08" stroke-width="0.5"/>
      <line x1="0" y1="20" x2="20" y2="20" stroke="#ffffff08" stroke-width="0.5"/>
    </pattern>
    <!-- Scanline bar gradient (dark) -->
    <linearGradient id="barDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a2a"/>
      <stop offset="100%" stop-color="#2a2a3a"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000080"/>
    </filter>
    <!-- Glow for title -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrowGold" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d4a020"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto" fill="#ff4444">
      <polygon points="0 0, 8 3, 0 6"/>
    </marker>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <rect width="1100" height="720" fill="url(#bgGrad)"/>
  <rect width="1100" height="720" fill="url(#grid)"/>

  <!-- ==================== OUTER GOLD BORDER ==================== -->
  <rect x="15" y="15" width="1070" height="690" rx="8" ry="8"
        fill="none" stroke="url(#goldGrad)" stroke-width="4"/>
  <rect x="22" y="22" width="1056" height="676" rx="6" ry="6"
        fill="none" stroke="#d4a02060" stroke-width="1"/>

  <!-- Corner ornaments -->
  <circle cx="15" cy="15" r="6" fill="#d4a020" opacity="0.6"/>
  <circle cx="1085" cy="15" r="6" fill="#d4a020" opacity="0.6"/>
  <circle cx="15" cy="705" r="6" fill="#d4a020" opacity="0.6"/>
  <circle cx="1085" cy="705" r="6" fill="#d4a020" opacity="0.6"/>

  <!-- ==================== TITLE BAR ==================== -->
  <rect x="200" y="30" width="700" height="42" rx="4" fill="#0a1a2e" stroke="url(#titleGold)" stroke-width="2"/>
  <line x1="200" y1="30" x2="900" y2="30" stroke="url(#titleGold)" stroke-width="2"/>
  <text x="550" y="58" text-anchor="middle" font-size="24" font-weight="bold"
        fill="url(#titleGold)" filter="url(#glow)" font-variant="small-caps"
        letter-spacing="3">CGA Scanline Palette Streaming</text>
  <!-- Decorative lines -->
  <line x1="220" y1="68" x2="880" y2="68" stroke="#d4a02040" stroke-width="1"/>

  <!-- ================================================================ -->
  <!-- EVEN SCANLINE PANEL                                              -->
  <!-- ================================================================ -->
  <rect x="45" y="85" width="1010" height="280" rx="6" fill="#0d1f35" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.95"/>

  <!-- HBLANK / VISIBLE AREA labels -->
  <text x="325" y="112" text-anchor="middle" font-size="15" fill="#cccccc" font-weight="bold" letter-spacing="2">HBLANK</text>
  <line x1="120" y1="118" x2="520" y2="118" stroke="#ffffff30" stroke-width="1"/>
  <text x="780" y="112" text-anchor="middle" font-size="15" fill="#cccccc" font-weight="bold" letter-spacing="2">VISIBLE AREA</text>
  <line x1="540" y1="118" x2="960" y2="118" stroke="#ffffff30" stroke-width="1"/>

  <!-- EVEN SCANLINE label -->
  <text x="62" y="162" font-size="18" fill="#ffffff" font-weight="bold">EVEN</text>
  <text x="62" y="180" font-size="12" fill="#aaaaaa">SCANLINE</text>
  <text x="62" y="196" font-size="10" fill="#d4a020" font-style="italic">Palette 0</text>

  <!-- Scanline bar background -->
  <rect x="120" y="140" width="910" height="48" rx="5" fill="url(#barDark)" stroke="#444455" stroke-width="1.5"/>

  <!-- HBLANK boundary marker (after E5 GB ~83 cycles) -->
  <line x1="530" y1="130" x2="530" y2="195" stroke="#ffffff40" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- FLIP box -->
  <rect x="130" y="148" width="55" height="32" rx="4" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="157" y="169" text-anchor="middle" font-size="13" fill="white" font-weight="bold">FLIP</text>

  <!-- Small arrow after FLIP -->
  <polygon points="190,164 198,160 198,168" fill="#d4a020"/>

  <!-- 12 OUT boxes (OUTSB operations) — color-coded by register -->
  <!-- E2: 2 bytes (R, GB) -->
  <rect x="204" y="148" width="38" height="32" rx="3" fill="#e6a800" stroke="#b38600" stroke-width="1"/>
  <text x="223" y="169" text-anchor="middle" font-size="11" fill="white" font-weight="bold">OUT</text>
  <rect x="245" y="148" width="38" height="32" rx="3" fill="#e6a800" stroke="#b38600" stroke-width="1"/>
  <text x="264" y="169" text-anchor="middle" font-size="11" fill="white" font-weight="bold">OUT</text>

  <!-- E3: 2 bytes -->
  <rect x="286" y="148" width="38" height="32" rx="3" fill="#e05050" stroke="#b03030" stroke-width="1"/>
  <text x="305" y="169" text-anchor="middle" font-size="11" fill="white" font-weight="bold">OUT</text>
  <rect x="327" y="148" width="38" height="32" rx="3" fill="#e05050" stroke="#b03030" stroke-width="1"/>
  <text x="346" y="169" text-anchor="middle" font-size="11" fill="white" font-weight="bold">OUT</text>

  <!-- E4: 2 bytes -->
  <rect x="368" y="148" width="38" height="32" rx="3" fill="#3080d0" stroke="#2060a0" stroke-width="1"/>
  <text x="387" y="169" text-anchor="middle" font-size="11" fill="white" font-weight="bold">OUT</text>
  <rect x="409" y="148" width="38" height="32" rx="3" fill="#3080d0" stroke="#2060a0" stroke-width="1"/>
  <text x="428" y="169" text-anchor="middle" font-size="11" fill="white" font-weight="bold">OUT</text>

  <!-- E5: 2 bytes -->
  <rect x="450" y="148" width="38" height="32" rx="3" fill="#9040b0" stroke="#7030a0" stroke-width="1"/>
  <text x="469" y="169" text-anchor="middle" font-size="11" fill="white" font-weight="bold">OUT</text>
  <rect x="491" y="148" width="38" height="32" rx="3" fill="#9040b0" stroke="#7030a0" stroke-width="1"/>
  <text x="510" y="169" text-anchor="middle" font-size="11" fill="white" font-weight="bold">OUT</text>

  <!-- E6: 2 bytes — spills into visible -->
  <rect x="532" y="148" width="38" height="32" rx="3" fill="#20a060" stroke="#108040" stroke-width="1"/>
  <text x="551" y="169" text-anchor="middle" font-size="11" fill="white" font-weight="bold">OUT</text>
  <rect x="573" y="148" width="38" height="32" rx="3" fill="#20a060" stroke="#108040" stroke-width="1"/>
  <text x="592" y="169" text-anchor="middle" font-size="11" fill="white" font-weight="bold">OUT</text>

  <!-- E7: 2 bytes — in visible area -->
  <rect x="614" y="148" width="38" height="32" rx="3" fill="#d06820" stroke="#a05010" stroke-width="1"/>
  <text x="633" y="169" text-anchor="middle" font-size="11" fill="white" font-weight="bold">OUT</text>
  <rect x="655" y="148" width="38" height="32" rx="3" fill="#d06820" stroke="#a05010" stroke-width="1"/>
  <text x="674" y="169" text-anchor="middle" font-size="11" fill="white" font-weight="bold">OUT</text>

  <!-- Register labels beneath OUT pairs -->
  <text x="243" y="199" text-anchor="middle" font-size="12" fill="#e6a800" font-weight="bold">E2</text>
  <text x="325" y="199" text-anchor="middle" font-size="12" fill="#e05050" font-weight="bold">E3</text>
  <text x="407" y="199" text-anchor="middle" font-size="12" fill="#3080d0" font-weight="bold">E4</text>
  <text x="489" y="199" text-anchor="middle" font-size="12" fill="#9040b0" font-weight="bold">E5</text>
  <text x="571" y="199" text-anchor="middle" font-size="12" fill="#20a060" font-weight="bold">E6</text>
  <text x="653" y="199" text-anchor="middle" font-size="12" fill="#d06820" font-weight="bold">E7</text>

  <!-- Beam arrow in visible area -->
  <line x1="700" y1="164" x2="1010" y2="164" stroke="url(#beamGrad)" stroke-width="3" marker-end="url(#arrowGold)"/>
  <!-- Speed lines -->
  <line x1="980" y1="156" x2="1020" y2="156" stroke="#d4a02060" stroke-width="1"/>
  <line x1="985" y1="160" x2="1025" y2="160" stroke="#d4a02040" stroke-width="1"/>
  <line x1="980" y1="168" x2="1020" y2="168" stroke="#d4a02060" stroke-width="1"/>
  <line x1="985" y1="172" x2="1025" y2="172" stroke="#d4a02040" stroke-width="1"/>

  <!-- ===== CURRENT / UPCOMING COLOR ANNOTATIONS ===== -->

  <!-- Down arrows from all 6 registers -->
  <line x1="243" y1="205" x2="243" y2="235" stroke="#e6a800" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="325" y1="205" x2="325" y2="235" stroke="#ff4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="407" y1="205" x2="407" y2="235" stroke="#e6a800" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="489" y1="205" x2="489" y2="235" stroke="#ff4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="571" y1="205" x2="571" y2="235" stroke="#e6a800" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="653" y1="205" x2="653" y2="235" stroke="#ff4444" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Per-register current/upcoming labels -->
  <text x="243" y="250" text-anchor="middle" font-size="10" fill="#e6a800" font-style="italic">Current</text>
  <text x="325" y="250" text-anchor="middle" font-size="10" fill="#50ff80" font-style="italic">Upcoming</text>
  <text x="407" y="250" text-anchor="middle" font-size="10" fill="#e6a800" font-style="italic">Current</text>
  <text x="489" y="250" text-anchor="middle" font-size="10" fill="#50ff80" font-style="italic">Upcoming</text>
  <text x="571" y="250" text-anchor="middle" font-size="10" fill="#e6a800" font-style="italic">Current</text>
  <text x="653" y="250" text-anchor="middle" font-size="10" fill="#50ff80" font-style="italic">Upcoming</text>

  <!-- Legend: Current explanation -->
  <rect x="160" y="264" width="12" height="12" rx="2" fill="#e6a800" opacity="0.8"/>
  <text x="178" y="275" font-size="12" fill="#e6a800" font-weight="bold">E2, E4, E6: Current</text>
  <text x="178" y="290" font-size="11" fill="#aaaaaa" font-style="italic">This even line's colors — Palette 0 (active) — column order matters</text>

  <!-- Legend: Upcoming explanation -->
  <rect x="160" y="304" width="12" height="12" rx="2" fill="#50ff80" opacity="0.8"/>
  <text x="178" y="315" font-size="12" fill="#50ff80" font-weight="bold">E3, E5, E7: Upcoming</text>
  <text x="178" y="330" font-size="11" fill="#aaaaaa" font-style="italic">Next odd line's colors — Palette 1 (preloaded) — safe in any column</text>

  <!-- 13 OUTs / ~119 cycles annotation -->
  <text x="760" y="210" font-size="11" fill="#888888">13 OUTs · ~119 cycles</text>
  <text x="760" y="226" font-size="11" fill="#666666">OUTSB × 12 + FLIP</text>

  <!-- ================================================================ -->
  <!-- ODD SCANLINE PANEL                                               -->
  <!-- ================================================================ -->
  <rect x="45" y="400" width="1010" height="270" rx="6" fill="#0d1f35" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.95"/>

  <!-- HBLANK / VISIBLE AREA labels -->
  <text x="270" y="427" text-anchor="middle" font-size="15" fill="#cccccc" font-weight="bold" letter-spacing="2">HBLANK</text>
  <line x1="120" y1="433" x2="420" y2="433" stroke="#ffffff30" stroke-width="1"/>
  <text x="730" y="427" text-anchor="middle" font-size="15" fill="#cccccc" font-weight="bold" letter-spacing="2">VISIBLE AREA</text>
  <line x1="500" y1="433" x2="960" y2="433" stroke="#ffffff30" stroke-width="1"/>

  <!-- ODD SCANLINE label -->
  <text x="62" y="477" font-size="18" fill="#ffffff" font-weight="bold">ODD</text>
  <text x="62" y="495" font-size="12" fill="#aaaaaa">SCANLINE</text>
  <text x="62" y="511" font-size="10" fill="#d4a020" font-style="italic">Palette 1</text>

  <!-- Scanline bar background -->
  <rect x="120" y="455" width="910" height="48" rx="5" fill="url(#barDark)" stroke="#444455" stroke-width="1.5"/>

  <!-- HBLANK boundary marker -->
  <line x1="460" y1="445" x2="460" y2="510" stroke="#ffffff20" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Fast-forward arrows (indicating fast/simple operation) -->
  <polygon points="130,475 145,469 145,481" fill="#aaaaaa"/>
  <polygon points="148,475 163,469 163,481" fill="#aaaaaa"/>
  <polygon points="166,475 181,469 181,481" fill="#aaaaaa"/>
  <polygon points="184,475 199,469 199,481" fill="#aaaaaa"/>

  <!-- FLIP box -->
  <rect x="210" y="463" width="65" height="32" rx="4" fill="#e91e63" stroke="#c2185b" stroke-width="1.5"/>
  <text x="242" y="484" text-anchor="middle" font-size="13" fill="white" font-weight="bold">FLIP</text>

  <!-- Dot separator -->
  <circle cx="285" cy="479" r="3" fill="#888888"/>

  <!-- CLOSE box -->
  <rect x="295" y="463" width="65" height="32" rx="4" fill="#d4a020" stroke="#b38600" stroke-width="1.5"/>
  <text x="327" y="484" text-anchor="middle" font-size="13" fill="white" font-weight="bold">CLOSE</text>

  <!-- Dot separator -->
  <circle cx="370" cy="479" r="3" fill="#888888"/>

  <!-- OPEN box -->
  <rect x="380" y="463" width="65" height="32" rx="4" fill="#4CAF50" stroke="#388E3C" stroke-width="1.5"/>
  <text x="412" y="484" text-anchor="middle" font-size="13" fill="white" font-weight="bold">OPEN</text>

  <!-- Beam arrow in visible area -->
  <line x1="470" y1="479" x2="1010" y2="479" stroke="url(#beamGrad)" stroke-width="3" marker-end="url(#arrowGold)"/>
  <!-- Speed lines -->
  <line x1="980" y1="471" x2="1020" y2="471" stroke="#d4a02060" stroke-width="1"/>
  <line x1="985" y1="475" x2="1025" y2="475" stroke="#d4a02040" stroke-width="1"/>
  <line x1="980" y1="483" x2="1020" y2="483" stroke="#d4a02060" stroke-width="1"/>
  <line x1="985" y1="487" x2="1025" y2="487" stroke="#d4a02040" stroke-width="1"/>

  <!-- Down arrows from FLIP, CLOSE, OPEN -->
  <line x1="242" y1="500" x2="242" y2="530" stroke="#ff8844" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="327" y1="500" x2="327" y2="530" stroke="#ff8844" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="412" y1="500" x2="412" y2="530" stroke="#ff8844" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Bracket under the 3 operations -->
  <line x1="220" y1="542" x2="435" y2="542" stroke="#ffffff40" stroke-width="1.5"/>
  <line x1="220" y1="538" x2="220" y2="542" stroke="#ffffff40" stroke-width="1.5"/>
  <line x1="435" y1="538" x2="435" y2="542" stroke="#ffffff40" stroke-width="1.5"/>

  <text x="327" y="562" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="bold">FLIP · CLOSE · OPEN</text>
  <text x="327" y="582" text-anchor="middle" font-size="12" fill="#aaaaaa" font-style="italic">Rapid palette switch during HBLANK</text>
  <text x="327" y="600" text-anchor="middle" font-size="11" fill="#666666">Reset write pointer to E2 for next even line</text>

  <!-- 3 OUTs / ~37 cycles annotation -->
  <text x="500" y="540" font-size="11" fill="#888888">3 OUTs · ~37 cycles</text>
  <text x="500" y="556" font-size="11" fill="#666666">All within HBLANK</text>

  <!-- ==================== FOOTER ==================== -->
  <line x1="100" y1="685" x2="1000" y2="685" stroke="#d4a02030" stroke-width="1"/>
  <text x="550" y="700" text-anchor="middle" font-size="11" fill="#555555">
    Olivetti Prodest PC1 · Yamaha V6355D · NEC V40 @ 8 MHz · CGA Mode 4 · Deferred Open/Close Pattern
  </text>
  <text x="1070" y="700" text-anchor="end" font-size="10" fill="#d4a02080" font-style="italic">Illustration by Retro Erik</text>

</svg>